<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Q&A Practice by Kafa’ah · Light/Dark</title>
    <style>
        /* ----- CSS variables for light & dark themes (default: light) ----- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        :root {
            --bg-gradient-start: #f5f7fa;
            --bg-gradient-end: #c3cfe2;
            --card-bg: white;
            --text-primary: #2d3748;
            --text-secondary: #4a5568;
            --text-muted: #718096;
            --border-light: #eef2f7;
            --question-bg: #f8fafc;
            --question-border: #4f46e5;
            --option-bg: #f8fafc;
            --option-border: #e2e8f0;
            --option-hover: #edf2f7;
            --option-hover-border: #cbd5e0;
            --option-selected-bg: #e0e7ff;
            --option-selected-border: #4f46e5;
            --input-bg: #f8fafc;
            --input-border: #e2e8f0;
            --btn-primary-bg: #4f46e5;
            --btn-primary-hover: #4338ca;
            --btn-secondary-bg: #e2e8f0;
            --btn-secondary-text: #4a5568;
            --btn-secondary-hover: #cbd5e0;
            --badge-medium-bg: #e9d5ff;
            --badge-medium-text: #7c3aed;
            --badge-hard-bg: #fed7d7;
            --badge-hard-text: #c53030;
            --badge-topic-bg: #c6f6d5;
            --badge-topic-text: #2f855a;
            --feedback-correct-bg: #f0fff4;
            --feedback-correct-border: #9ae6b4;
            --feedback-correct-text: #2f855a;
            --feedback-wrong-bg: #fff5f5;
            --feedback-wrong-border: #fc8181;
            --feedback-wrong-text: #c53030;
            --stat-value: #4f46e5;
            --shadow-color: rgba(0, 0, 0, 0.08);
            --loading-dots: #718096;
        }

        /* ----- DARK MODE VARIABLES ----- */
        [data-theme="dark"] {
            --bg-gradient-start: #1a202c;
            --bg-gradient-end: #2d3748;
            --card-bg: #2d3748;
            --text-primary: #f7fafc;
            --text-secondary: #e2e8f0;
            --text-muted: #a0aec0;
            --border-light: #4a5568;
            --question-bg: #2d3748;
            --question-border: #818cf8;
            --option-bg: #2d3748;
            --option-border: #4a5568;
            --option-hover: #374151;
            --option-hover-border: #718096;
            --option-selected-bg: #4f46e5;
            --option-selected-border: #818cf8;
            --input-bg: #374151;
            --input-border: #4a5568;
            --btn-primary-bg: #6366f1;
            --btn-primary-hover: #818cf8;
            --btn-secondary-bg: #4a5568;
            --btn-secondary-text: #e2e8f0;
            --btn-secondary-hover: #718096;
            --badge-medium-bg: #553c9a;
            --badge-medium-text: #e9d5ff;
            --badge-hard-bg: #9b2c2c;
            --badge-hard-text: #fed7d7;
            --badge-topic-bg: #276749;
            --badge-topic-text: #c6f6d5;
            --feedback-correct-bg: #22543d;
            --feedback-correct-border: #48bb78;
            --feedback-correct-text: #f0fff4;
            --feedback-wrong-bg: #742a2a;
            --feedback-wrong-border: #f56565;
            --feedback-wrong-text: #fff5f5;
            --stat-value: #a5b4fc;
            --shadow-color: rgba(0, 0, 0, 0.5);
            --loading-dots: #cbd5e0;
        }

        body {
            background: linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: var(--text-primary);
            transition: background 0.3s ease, color 0.2s ease;
        }

        .container {
            width: 100%;
            max-width: 800px;
        }

        .app-card {
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 10px 30px var(--shadow-color);
            padding: 40px;
            width: 100%;
            transition: transform 0.3s ease, background 0.3s ease, box-shadow 0.3s ease;
        }

        .app-card:hover {
            transform: translateY(-5px);
        }

        .header {
            text-align: center;
            margin-bottom: 35px;
            border-bottom: 2px solid var(--border-light);
            padding-bottom: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .header h1 {
            color: var(--text-primary);
            font-size: 2.5rem;
            margin-bottom: 8px;
            background: linear-gradient(90deg, #4f46e5, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        /* ----- Theme toggle button ----- */
        .theme-toggle {
            position: absolute;
            top: 0;
            right: 0;
            background: var(--btn-secondary-bg);
            border: none;
            color: var(--btn-secondary-text);
            padding: 10px 18px;
            border-radius: 40px;
            font-size: 0.95rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
        }
        .theme-toggle:hover {
            background: var(--btn-secondary-hover);
            color: var(--text-primary);
        }
        .theme-toggle span {
            font-size: 1.2rem;
        }
        @media (max-width: 768px) {
            .theme-toggle {
                position: static;
                margin-top: 15px;
            }
            .header {
                position: relative;
            }
        }

        .question-section {
            margin-bottom: 35px;
        }

        .question-info {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .badge {
            padding: 6px 14px;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .level-medium { background: var(--badge-medium-bg); color: var(--badge-medium-text); }
        .level-hard { background: var(--badge-hard-bg); color: var(--badge-hard-text); }
        .topic { background: var(--badge-topic-bg); color: var(--badge-topic-text); }

        .question-text {
            font-size: 1.4rem;
            line-height: 1.6;
            margin-bottom: 25px;
            color: var(--text-primary);
            padding: 20px;
            background: var(--question-bg);
            border-radius: 12px;
            border-left: 5px solid var(--question-border);
            transition: background 0.2s, border-color 0.2s;
        }

        .options-container {
            margin: 25px 0;
            display: grid;
            gap: 12px;
        }

        .option-item {
            padding: 15px 20px;
            background: var(--option-bg);
            border: 2px solid var(--option-border);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1.05rem;
            color: var(--text-primary);
        }

        .option-item:hover {
            background: var(--option-hover);
            border-color: var(--option-hover-border);
        }

        .option-selected {
            background: var(--option-selected-bg);
            border-color: var(--option-selected-border);
            color: var(--option-selected-border);
        }

        .input-section {
            margin: 30px 0;
        }

        .input-section label {
            display: block;
            margin-bottom: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            font-size: 1.1rem;
        }

        .answer-input {
            width: 100%;
            padding: 18px 20px;
            font-size: 1.1rem;
            border: 2px solid var(--input-border);
            border-radius: 12px;
            transition: border-color 0.2s, background 0.2s;
            background: var(--input-bg);
            color: var(--text-primary);
        }

        .answer-input:focus {
            outline: none;
            border-color: var(--question-border);
            background: var(--card-bg);
        }

        .feedback-section {
            margin: 30px 0;
            padding: 25px;
            border-radius: 12px;
            display: none;
            animation: fadeIn 0.5s;
            transition: background 0.2s, border 0.2s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .feedback-correct {
            background: var(--feedback-correct-bg);
            border: 2px solid var(--feedback-correct-border);
            color: var(--feedback-correct-text);
        }

        .feedback-wrong {
            background: var(--feedback-wrong-bg);
            border: 2px solid var(--feedback-wrong-border);
            color: var(--feedback-wrong-text);
        }

        .feedback-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 15px;
            font-size: 1.3rem;
            font-weight: 600;
        }

        .correct-answer {
            font-size: 1.1rem;
            margin: 15px 0;
            padding: 15px;
            background: var(--card-bg);
            border-radius: 8px;
            font-weight: 500;
            color: var(--text-primary);
        }

        .explanation {
            font-size: 1rem;
            line-height: 1.5;
            color: var(--text-secondary);
            font-style: italic;
            border-top: 1px solid var(--border-light);
            padding-top: 15px;
        }

        .buttons-container {
            display: flex;
            gap: 20px;
            margin-top: 30px;
        }

        .btn {
            padding: 18px 30px;
            font-size: 1.1rem;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            flex: 1;
            text-align: center;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: var(--btn-primary-bg);
            color: white;
        }

        .btn-primary:hover {
            background: var(--btn-primary-hover);
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: var(--btn-secondary-bg);
            color: var(--btn-secondary-text);
        }

        .btn-secondary:hover {
            background: var(--btn-secondary-hover);
            color: var(--text-primary);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
        }

        .progress-info {
            text-align: center;
            margin-top: 25px;
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .loading {
            text-align: center;
            padding: 50px;
            font-size: 1.2rem;
            color: var(--loading-dots);
        }

        .loading::after {
            content: '...';
            animation: dots 1.5s steps(4, end) infinite;
        }

        @keyframes dots {
            0%, 20% { content: ''; }
            40% { content: '.'; }
            60% { content: '..'; }
            80%, 100% { content: '...'; }
        }

        @media (max-width: 768px) {
            .app-card {
                padding: 25px;
            }
            
            .header h1 {
                font-size: 2rem;
            }
            
            .question-text {
                font-size: 1.2rem;
                padding: 15px;
            }
            
            .buttons-container {
                flex-direction: column;
                gap: 12px;
            }
            
            .btn {
                padding: 16px;
            }
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border-light);
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--stat-value);
            transition: color 0.2s;
        }

        .stat-label {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-top: 5px;
        }

        /* Additional dark mode polish */
        [data-theme="dark"] .option-selected {
            color: white;
        }
        [data-theme="dark"] .option-item {
            color: #e2e8f0;
        }
        [data-theme="dark"] .feedback-correct .correct-answer,
        [data-theme="dark"] .feedback-wrong .correct-answer {
            background: #374151;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="app-card">
            <div class="header">
                <h1>English Q&A Practice</h1>
                <p>Test your English grammar, vocabulary, and comprehension skills</p>
                <!-- Light / Dark toggle button -->
                <button id="themeToggleBtn" class="theme-toggle">
                    <span>🌙</span> Dark mode
                </button>
            </div>

            <div id="loading" class="loading">Loading questions</div>

            <div id="app-content" style="display: none;">
                <div class="question-section">
                    <div class="question-info">
                        <div id="level-badge" class="badge level-medium">Medium</div>
                        <div id="topic-badge" class="badge topic">Grammar</div>
                    </div>
                    <div id="question-text" class="question-text">
                        Question will appear here...
                    </div>
                    
                    <div id="options-container" class="options-container">
                        <!-- MCQ options will be inserted here -->
                    </div>
                    
                    <div class="input-section">
                        <label for="answer-input">Your Answer:</label>
                        <input type="text" id="answer-input" class="answer-input" 
                               placeholder="Type your answer here...">
                    </div>
                </div>

                <div id="feedback-section" class="feedback-section">
                    <div class="feedback-header">
                        <span id="feedback-icon"></span>
                        <span id="feedback-title"></span>
                    </div>
                    <div id="correct-answer" class="correct-answer"></div>
                    <div id="explanation" class="explanation"></div>
                </div>

                <div class="buttons-container">
                    <button id="submit-btn" class="btn btn-primary" onclick="submitAnswer()">
                        Submit Answer
                    </button>
                    <button id="next-btn" class="btn btn-secondary" onclick="nextQuestion()" disabled>
                        Next Question
                    </button>
                </div>

                <div class="progress-info">
                    Question <span id="current-index">1</span> of <span id="total-questions">120</span> 
                    | <span id="remaining-count">119</span> questions remaining
                </div>

                <div class="stats">
                    <div class="stat-item">
                        <div class="stat-value" id="correct-count">0</div>
                        <div class="stat-label">Correct</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="answered-count">0</div>
                        <div class="stat-label">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="accuracy">0%</div>
                        <div class="stat-label">Accuracy</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ----- LIGHT / DARK MODE TOGGLE -----
        (function() {
            const themeToggleBtn = document.getElementById('themeToggleBtn');
            // Check local storage for theme preference
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
            updateToggleButton(savedTheme);

            function updateToggleButton(theme) {
                const btn = themeToggleBtn;
                if (theme === 'dark') {
                    btn.innerHTML = '<span>☀️</span> Light mode';
                } else {
                    btn.innerHTML = '<span>🌙</span> Dark mode';
                }
            }

            themeToggleBtn.addEventListener('click', function() {
                const currentTheme = document.documentElement.getAttribute('data-theme');
                const newTheme = currentTheme === 'light' ? 'dark' : 'light';
                document.documentElement.setAttribute('data-theme', newTheme);
                localStorage.setItem('theme', newTheme);
                updateToggleButton(newTheme);
            });
        })();

        // ----- APPLICATION STATE -----
        const state = {
            questions: [],
            usedQuestions: new Set(),
            currentQuestion: null,
            totalCorrect: 0,
            totalAnswered: 0,
            isAnswered: false
        };

        // DOM elements
        const loadingEl = document.getElementById('loading');
        const appContentEl = document.getElementById('app-content');
        const questionTextEl = document.getElementById('question-text');
        const levelBadgeEl = document.getElementById('level-badge');
        const topicBadgeEl = document.getElementById('topic-badge');
        const optionsContainerEl = document.getElementById('options-container');
        const answerInputEl = document.getElementById('answer-input');
        const feedbackSectionEl = document.getElementById('feedback-section');
        const feedbackIconEl = document.getElementById('feedback-icon');
        const feedbackTitleEl = document.getElementById('feedback-title');
        const correctAnswerEl = document.getElementById('correct-answer');
        const explanationEl = document.getElementById('explanation');
        const submitBtnEl = document.getElementById('submit-btn');
        const nextBtnEl = document.getElementById('next-btn');
        const currentIndexEl = document.getElementById('current-index');
        const totalQuestionsEl = document.getElementById('total-questions');
        const remainingCountEl = document.getElementById('remaining-count');
        const correctCountEl = document.getElementById('correct-count');
        const answeredCountEl = document.getElementById('answered-count');
        const accuracyEl = document.getElementById('accuracy');

        // Initialize application
        async function initApp() {
            try {
                // Fetch questions from JSON
                const response = await fetch('https://raw.githubusercontent.com/kafaahbd/nothing/refs/heads/main/batch1.json');
                
                if (!response.ok) {
                    throw new Error(`Failed to fetch questions: ${response.status}`);
                }
                
                state.questions = await response.json();
                
                // Update UI with question count
                totalQuestionsEl.textContent = state.questions.length;
                remainingCountEl.textContent = state.questions.length;
                
                // Hide loading, show app
                loadingEl.style.display = 'none';
                appContentEl.style.display = 'block';
                
                // Load first question
                loadRandomQuestion();
                
            } catch (error) {
                loadingEl.innerHTML = `Error loading questions: ${error.message}. Please refresh the page.`;
                console.error('Error:', error);
            }
        }

        // Get a random unused question
        function getRandomQuestion() {
            // If all questions have been used, reset the used set
            if (state.usedQuestions.size >= state.questions.length) {
                state.usedQuestions.clear();
            }

            // Find questions not yet used
            const availableQuestions = state.questions.filter((q, index) => 
                !state.usedQuestions.has(index)
            );

            if (availableQuestions.length === 0) {
                return null;
            }

            // Pick random question from available ones
            const randomIndex = Math.floor(Math.random() * availableQuestions.length);
            const question = availableQuestions[randomIndex];
            
            // Find the original index to mark as used
            const originalIndex = state.questions.findIndex(q => q.id === question.id);
            state.usedQuestions.add(originalIndex);
            
            return question;
        }

        // Load and display a random question
        function loadRandomQuestion() {
            // Reset UI state
            state.isAnswered = false;
            feedbackSectionEl.style.display = 'none';
            nextBtnEl.disabled = true;
            answerInputEl.disabled = false;
            answerInputEl.value = '';
            answerInputEl.style.display = 'block';
            submitBtnEl.disabled = false;
            
            // Clear any previous options
            optionsContainerEl.innerHTML = '';
            optionsContainerEl.style.display = 'none';
            
            // Get new question
            state.currentQuestion = getRandomQuestion();
            
            if (!state.currentQuestion) {
                questionTextEl.textContent = "All questions completed! Refresh the page to start over.";
                return;
            }

            // Update question text
            questionTextEl.textContent = state.currentQuestion.question;
            
            // Update badges
            levelBadgeEl.textContent = state.currentQuestion.level.charAt(0).toUpperCase() + 
                                      state.currentQuestion.level.slice(1);
            levelBadgeEl.className = `badge level-${state.currentQuestion.level}`;
            topicBadgeEl.textContent = state.currentQuestion.topic;
            
            // Display options for MCQ questions
            if (state.currentQuestion.type === 'mcq' && state.currentQuestion.options.length > 0) {
                optionsContainerEl.style.display = 'grid';
                answerInputEl.style.display = 'none';
                
                state.currentQuestion.options.forEach((option, index) => {
                    const optionEl = document.createElement('div');
                    optionEl.className = 'option-item';
                    optionEl.textContent = option;
                    optionEl.onclick = () => selectOption(optionEl, option);
                    optionsContainerEl.appendChild(optionEl);
                });
            } else {
                // For fill/short questions, show input field
                optionsContainerEl.style.display = 'none';
                answerInputEl.style.display = 'block';
                answerInputEl.focus();
                answerInputEl.placeholder = state.currentQuestion.type === 'fill' 
                    ? "Fill in the blank..." 
                    : "Type your answer...";
            }

            // Update progress indicators
            currentIndexEl.textContent = state.usedQuestions.size;
            remainingCountEl.textContent = state.questions.length - state.usedQuestions.size + 1;
        }

        // Handle option selection for MCQ questions
        function selectOption(optionElement, selectedOption) {
            // Clear previous selection
            document.querySelectorAll('.option-item').forEach(el => {
                el.classList.remove('option-selected');
            });
            
            // Mark selected option
            optionElement.classList.add('option-selected');
            
            // Store selected answer
            state.currentQuestion.userAnswer = selectedOption;
        }

        // Submit the user's answer
        window.submitAnswer = function() {
            if (state.isAnswered) return;
            
            let userAnswer = '';
            
            // Get user's answer based on question type
            if (state.currentQuestion.type === 'mcq') {
                const selectedOption = document.querySelector('.option-selected');
                if (!selectedOption) {
                    alert('Please select an option before submitting.');
                    return;
                }
                userAnswer = state.currentQuestion.userAnswer;
            } else {
                userAnswer = answerInputEl.value.trim();
                if (!userAnswer) {
                    alert('Please enter an answer before submitting.');
                    return;
                }
            }

            // Store user's answer
            state.currentQuestion.userAnswer = userAnswer;
            state.isAnswered = true;
            state.totalAnswered++;
            
            // Check if answer is correct
            const correctAnswer = state.currentQuestion.answer;
            const isCorrect = userAnswer.toLowerCase() === correctAnswer.toLowerCase();
            
            if (isCorrect) {
                state.totalCorrect++;
            }
            
            // Update stats
            updateStats();
            
            // Display feedback
            showFeedback(isCorrect, correctAnswer);
            
            // Update UI
            answerInputEl.disabled = true;
            submitBtnEl.disabled = true;
            nextBtnEl.disabled = false;
        };

        // Display feedback to the user
        function showFeedback(isCorrect, correctAnswer) {
            feedbackSectionEl.style.display = 'block';
            
            if (isCorrect) {
                feedbackSectionEl.className = 'feedback-section feedback-correct';
                feedbackIconEl.innerHTML = '✅';
                feedbackTitleEl.textContent = 'Correct!';
            } else {
                feedbackSectionEl.className = 'feedback-section feedback-wrong';
                feedbackIconEl.innerHTML = '❌';
                feedbackTitleEl.textContent = 'Wrong!';
            }
            
            // Show correct answer
            correctAnswerEl.innerHTML = `<strong>Correct Answer:</strong> ${correctAnswer}`;
            
            // Show explanation if available
            if (state.currentQuestion.explanation) {
                explanationEl.innerHTML = `<strong>Explanation:</strong> ${state.currentQuestion.explanation}`;
                explanationEl.style.display = 'block';
            } else {
                explanationEl.style.display = 'none';
            }
        }

        // Update statistics display
        function updateStats() {
            correctCountEl.textContent = state.totalCorrect;
            answeredCountEl.textContent = state.totalAnswered;
            
            const accuracy = state.totalAnswered > 0 
                ? Math.round((state.totalCorrect / state.totalAnswered) * 100) 
                : 0;
            accuracyEl.textContent = `${accuracy}%`;
        }

        // Load the next question
        window.nextQuestion = function() {
            loadRandomQuestion();
        };

        // Handle Enter key for submission
        document.addEventListener('keydown', (event) => {
            if (event.key === 'Enter' && !state.isAnswered && appContentEl.style.display !== 'none') {
                submitAnswer();
            }
        });

        // Handle input field for non-MCQ questions
        answerInputEl.addEventListener('input', function() {
            if (state.currentQuestion) {
                state.currentQuestion.userAnswer = this.value;
            }
        });

        // Initialize the app when page loads
        window.onload = initApp;
    </script>
